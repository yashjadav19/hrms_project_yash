<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{layout :: head('My Profile')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout :: sidebar-employee}"></div>

        <main class="col-md-10 ms-sm-auto content-area">
            <h4 class="mb-4">My Profile</h4>

            <div class="row">
                <div class="col-md-6">
                    <div class="card mb-4">
                        <div class="card-header fw-semibold">
                            <i class="bi bi-person-circle me-2"></i>Personal Information
                        </div>
                        <div class="card-body">
                            <dl class="row">
                                <dt class="col-sm-4">Employee ID</dt>
                                <dd class="col-sm-8" th:text="${employee.employeeId}">-</dd>

                                <dt class="col-sm-4">Full Name</dt>
                                <dd class="col-sm-8" th:text="${employee.fullName}">-</dd>

                                <dt class="col-sm-4">Email</dt>
                                <dd class="col-sm-8" th:text="${employee.email}">-</dd>

                                <dt class="col-sm-4">Phone</dt>
                                <dd class="col-sm-8" th:text="${employee.phone}">-</dd>

                                <dt class="col-sm-4">Department</dt>
                                <dd class="col-sm-8" th:text="${employee.department}">-</dd>

                                <dt class="col-sm-4">Position</dt>
                                <dd class="col-sm-8" th:text="${employee.position}">-</dd>

                                <dt class="col-sm-4">Hire Date</dt>
                                <dd class="col-sm-8" th:text="${employee.hireDate}">-</dd>
                            </dl>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header fw-semibold">
                            <i class="bi bi-calendar-heart me-2"></i>Leave Balance (2025)
                        </div>
                        <div class="card-body">
                            <div th:if="${balance != null}">
                                <div class="mb-4">
                                    <div class="d-flex justify-content-between mb-1">
                                        <span class="fw-semibold">Vacation Days</span>
                                        <span class="badge bg-success fs-6"
                                              th:text="${balance.vacationDaysRemaining} + ' days left'">15 days left</span>
                                    </div>
                                    <div class="progress" style="height: 10px;">
                                        <div class="progress-bar bg-success"
                                             th:style="'width: ' + (${balance.vacationDaysRemaining} * 100 / 15) + '%'"></div>
                                    </div>
                                    <small class="text-muted">15 total per year</small>
                                </div>
                                <div>
                                    <div class="d-flex justify-content-between mb-1">
                                        <span class="fw-semibold">Sick Days</span>
                                        <span class="badge bg-info fs-6"
                                              th:text="${balance.sickDaysRemaining} + ' days left'">10 days left</span>
                                    </div>
                                    <div class="progress" style="height: 10px;">
                                        <div class="progress-bar bg-info"
                                             th:style="'width: ' + (${balance.sickDaysRemaining} * 100 / 10) + '%'"></div>
                                    </div>
                                    <small class="text-muted">10 total per year</small>
                                </div>
                            </div>
                            <div th:if="${balance == null}" class="text-muted">
                                No leave balance found for this year.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
