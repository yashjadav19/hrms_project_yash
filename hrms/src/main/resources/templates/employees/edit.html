<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Edit Employee')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout :: sidebar-admin}"></div>

        <main class="col-md-10 ms-sm-auto content-area">
            <div class="d-flex align-items-center mb-4">
                <a href="/employees" class="btn btn-outline-secondary btn-sm me-3">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h4 class="mb-0">Edit Employee</h4>
            </div>

            <div class="card" style="max-width: 700px;">
                <div class="card-body">
                    <form th:action="@{/employees/edit/{id}(id=${employee.id})}"
                          th:object="${employee}" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Employee ID</label>
                                <input type="text" class="form-control" th:value="${employee.employeeId}" readonly>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Full Name *</label>
                                <input type="text" class="form-control" th:field="*{fullName}"
                                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{fullName}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email Address *</label>
                                <input type="email" class="form-control" th:field="*{email}"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:errors="*{email}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">New Password (leave blank to keep current)</label>
                                <input type="password" class="form-control" th:field="*{password}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone</label>
                                <input type="text" class="form-control" th:field="*{phone}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Department</label>
                                <select class="form-select" th:field="*{department}">
                                    <option value="">-- Select --</option>
                                    <option value="Engineering">Engineering</option>
                                    <option value="Marketing">Marketing</option>
                                    <option value="HR">HR</option>
                                    <option value="Finance">Finance</option>
                                    <option value="Operations">Operations</option>
                                    <option value="Management">Management</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Position</label>
                                <input type="text" class="form-control" th:field="*{position}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Hire Date</label>
                                <input type="date" class="form-control" th:field="*{hireDate}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Salary</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" class="form-control" th:field="*{salary}"
                                           step="0.01" min="0"
                                           th:classappend="${#fields.hasErrors('salary')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:errors="*{salary}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Role</label>
                                <select class="form-select" th:field="*{role}">
                                    <option value="EMPLOYEE">Employee</option>
                                    <option value="ADMIN">Admin</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Update Employee</button>
                            <a href="/employees" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
