<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - HRMS'">HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
        .sidebar { min-height: calc(100vh - 56px); background: #fff; border-right: 1px solid #dee2e6; }
        .sidebar .nav-link { color: #495057; border-radius: 6px; margin: 2px 8px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #e9ecef; color: #0d6efd; }
        .sidebar .nav-link i { width: 20px; }
        .content-area { padding: 24px; }
        .stat-card { border-radius: 10px; border: none; }
        .badge-pending { background-color: #ffc107; color: #000; }
        .badge-approved { background-color: #198754; }
        .badge-rejected { background-color: #dc3545; }
    </style>
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-building me-2"></i>HRMS
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <span class="nav-link text-white-50">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">User</span>
                    </span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-light ms-2">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="sidebar-admin" class="sidebar col-md-2 d-md-block pt-3">
    <ul class="nav flex-column">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${#httpServletRequest.requestURI == '/dashboard'} ? 'active'" href="/dashboard">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${#httpServletRequest.requestURI.startsWith('/employees')} ? 'active'" href="/employees">
                <i class="bi bi-people me-2"></i>Employees
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${#httpServletRequest.requestURI == '/leaves/requests'} ? 'active'" href="/leaves/requests">
                <i class="bi bi-calendar-check me-2"></i>Leave Requests
            </a>
        </li>
    </ul>
</div>

<div th:fragment="sidebar-employee" class="sidebar col-md-2 d-md-block pt-3">
    <ul class="nav flex-column">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${#httpServletRequest.requestURI == '/dashboard'} ? 'active'" href="/dashboard">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${#httpServletRequest.requestURI == '/leaves/my-leaves'} ? 'active'" href="/leaves/my-leaves">
                <i class="bi bi-calendar2 me-2"></i>My Leaves
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${#httpServletRequest.requestURI == '/leaves/submit'} ? 'active'" href="/leaves/submit">
                <i class="bi bi-plus-circle me-2"></i>Request Leave
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${#httpServletRequest.requestURI == '/leaves/profile'} ? 'active'" href="/leaves/profile">
                <i class="bi bi-person me-2"></i>My Profile
            </a>
        </li>
    </ul>
</div>

<footer th:fragment="footer" class="text-center text-muted py-3 mt-4 border-top small">
    &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2025</span> HRMS &mdash; Human Resource Management System
</footer>

</body>
</html>
