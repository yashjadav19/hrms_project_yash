<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('My Leaves')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout :: sidebar-employee}"></div>

        <main class="col-md-10 ms-sm-auto content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0">My Leave History</h4>
                <a href="/leaves/submit" class="btn btn-primary">
                    <i class="bi bi-plus me-1"></i>New Request
                </a>
            </div>

            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card">
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(requests)}" class="text-center text-muted py-5">
                        <i class="bi bi-calendar-x fs-2 d-block mb-2"></i>
                        No leave requests yet. Submit your first one!
                    </div>
                    <div th:if="${!#lists.isEmpty(requests)}" class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Type</th>
                                    <th>Start Date</th>
                                    <th>End Date</th>
                                    <th>Days</th>
                                    <th>Reason</th>
                                    <th>Status</th>
                                    <th>Admin Comment</th>
                                    <th>Submitted</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="req : ${requests}">
                                    <td>
                                        <span class="badge bg-primary" th:text="${req.leaveType}">Type</span>
                                    </td>
                                    <td th:text="${req.startDate}">-</td>
                                    <td th:text="${req.endDate}">-</td>
                                    <td th:text="${req.days}">0</td>
                                    <td th:text="${req.reason}">-</td>
                                    <td>
                                        <span th:class="${req.status == 'APPROVED'} ? 'badge badge-approved' :
                                                        (${req.status == 'REJECTED'} ? 'badge badge-rejected' : 'badge badge-pending')"
                                              th:text="${req.status}">STATUS</span>
                                    </td>
                                    <td th:text="${req.adminComment != null} ? ${req.adminComment} : '-'">-</td>
                                    <td th:text="${#temporals.format(req.submittedDate, 'yyyy-MM-dd')}">-</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
