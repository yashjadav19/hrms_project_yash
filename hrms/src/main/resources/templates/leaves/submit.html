<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Submit Leave')}"></head>
<body>
<div th:replace="~{layout :: navbar}"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout :: sidebar-employee}"></div>

        <main class="col-md-10 ms-sm-auto content-area">
            <div class="d-flex align-items-center mb-4">
                <a href="/leaves/my-leaves" class="btn btn-outline-secondary btn-sm me-3">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h4 class="mb-0">Submit Leave Request</h4>
            </div>

            <!-- show current balance before submitting -->
            <div th:if="${balance != null}" class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card border-success">
                        <div class="card-body text-center">
                            <div class="fs-2 fw-bold text-success" th:text="${balance.vacationDaysRemaining}">0</div>
                            <div class="text-muted small">Vacation Days Left</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-info">
                        <div class="card-body text-center">
                            <div class="fs-2 fw-bold text-info" th:text="${balance.sickDaysRemaining}">0</div>
                            <div class="text-muted small">Sick Days Left</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card" style="max-width: 600px;">
                <div class="card-body">
                    <form th:action="@{/leaves/submit}" th:object="${leaveRequest}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Leave Type *</label>
                            <select class="form-select" th:field="*{leaveType}" required>
                                <option value="">-- Select Type --</option>
                                <option value="VACATION">Vacation</option>
                                <option value="SICK">Sick Leave</option>
                                <option value="PERSONAL">Personal</option>
                                <option value="EMERGENCY">Emergency</option>
                            </select>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Start Date *</label>
                                <input type="date" class="form-control" th:field="*{startDate}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">End Date *</label>
                                <input type="date" class="form-control" th:field="*{endDate}" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Reason</label>
                            <textarea class="form-control" th:field="*{reason}" rows="4"
                                      placeholder="Briefly explain the reason for your leave..."></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Submit Request</button>
                            <a href="/leaves/my-leaves" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="~{layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
